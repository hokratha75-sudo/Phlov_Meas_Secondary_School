          nullable: true
        disciplineLogs:
          type: array
          items:
            $ref: "#/components/schemas/DisciplineLog"
        telegramChatId:
          type: integer
          nullable: true
        telegramLinkCode:
          type: string
          nullable: true
        telegramLinkedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, studentId, nameEn, nameKh, grade, gender, enrollmentYear, createdAt, updatedAt]

    CreateStudentRequest:
      type: object
      properties:
        studentId:
          type: string
