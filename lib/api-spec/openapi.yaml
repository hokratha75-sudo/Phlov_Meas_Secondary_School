          nullable: true
        address:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        biography:
          type: string
          nullable: true
        familyStatus:
          type: string
          nullable: true
      required: [studentId, nameEn, nameKh, grade, gender, enrollmentYear]

    StudentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Student"
        total:
          type: integer
      required: [data, total]

    DisciplineLog:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        faultDate:
          type: string
        faultDescription:
          type: string
        penaltyType:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, studentId, faultDate, faultDescription, penaltyType, createdAt, updatedAt]

    CreateDisciplineLogRequest:
      type: object
      properties:
        studentId:
          type: integer
        faultDate:
          type: string
        faultDescription:
          type: string
        penaltyType:
          type: string
      required: [studentId, faultDate, faultDescription, penaltyType]

    ContactMessage:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required: [id, fullName, message, isRead, createdAt]

    ContactListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ContactMessage"
        total:
          type: integer
      required: [data, total]

    SiteSettingsMap:
      type: object
      additionalProperties:
        type: string
      description: Map of setting key to JSON string value

    UpdateSettingRequest:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
      required: [key, value]

    StudentGrade:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        classroomId:
          type: integer
        academicYear:
          type: string
        examPeriod:
          type: string
        scores:
          type: object
          additionalProperties:
            type: number
        totalScore:
          type: number
          nullable: true
        average:
          type: number
          nullable: true
        rank:
          type: integer
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
        student:
          $ref: "#/components/schemas/Student"
      required: [id, studentId, classroomId, academicYear, examPeriod, scores, createdAt, updatedAt]

    StudentGradeInput:
      type: object
      properties:
        studentId:
          type: integer
        scores:
          type: object
          additionalProperties:
            type: number
        totalScore:
          type: number
          nullable: true
        average:
          type: number
          nullable: true
        rank:
          type: integer
          nullable: true
      required: [studentId, scores]

    BulkUpdateGradesRequest:
      type: object
      properties:
        classroomId:
          type: integer
        academicYear:
          type: string
        examPeriod:
          type: string
        grades:
          type: array
          items:
            $ref: "#/components/schemas/StudentGradeInput"
      required: [classroomId, academicYear, examPeriod, grades]

    StudentGradeListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/StudentGrade"
        total:
          type: integer
      required: [data, total]

