          items:
            $ref: "#/components/schemas/LibraryLog"
        total:
          type: integer
      required: [data, total]


    TelegramMessage:
      type: object
      properties:
        id:
          type: integer
        messageId:
          type: integer
        chatId:
          type: integer
        userId:
          type: integer
          nullable: true
        username:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        messageText:
          type: string
          nullable: true
        isFromBot:
          type: boolean
        isReplyToAdmin:
          type: boolean
        repliedBy:
          type: integer
          nullable: true
        repliedAt:
          type: string
          nullable: true
        status:
          type: string
        createdAt:
          type: string
      required: [id, messageId, chatId, isFromBot, isReplyToAdmin, status, createdAt]

    TelegramMessageListResponse:
