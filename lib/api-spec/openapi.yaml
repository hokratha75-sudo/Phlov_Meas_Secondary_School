    Classroom:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        grade:
          type: string
        roomNumber:
          type: string
          nullable: true
        teacherId:
          type: integer
          nullable: true
        teacher:
          $ref: "#/components/schemas/Teacher"
        studentsCount:
          type: integer
          description: Number of students in the classroom
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, name, grade, createdAt, updatedAt, studentsCount]

    CreateClassroomRequest:
      type: object
      properties:
        name:
          type: string
        grade:
          type: string
        roomNumber:
          type: string
          nullable: true
        teacherId:
          type: integer
          nullable: true
      required: [name, grade]

    ClassroomListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Classroom"
        total:
          type: integer
      required: [data, total]

    Student:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: string
        nameEn:
          type: string
        nameKh:
          type: string
        grade:
          type: string
        classId:
          type: integer
