openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Admin authentication
  - name: news
    description: News management
  - name: activities
    description: Activities management
  - name: teachers
    description: Teachers management
  - name: students
    description: Students management
  - name: contacts
    description: Contact messages
  - name: stats
    description: Dashboard statistics
  - name: settings
    description: Site settings management
  - name: grades
    description: Student grades management

paths:
  /settings:
    get:
      operationId: getSiteSettings
      tags: [settings]
      summary: Get all site settings
      responses:
        "200":
          description: All settings as key-value map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettingsMap"
    put:
      operationId: updateSiteSetting
      tags: [settings]
      summary: Update a site setting (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSettingRequest"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current admin user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /news:
    get:
      operationId: listNews
      tags: [news]
      summary: List all news
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: News list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsListResponse"
    post:
      operationId: createNews
      tags: [news]
      summary: Create news article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsArticle"

  /news/{id}:
    get:
      operationId: getNews
      tags: [news]
      summary: Get news by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: News article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsArticle"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateNews
      tags: [news]
      summary: Update news article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsArticle"
    delete:
      operationId: deleteNews
      tags: [news]
      summary: Delete news article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List all activities
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Activities list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityListResponse"
    post:
      operationId: createActivity
      tags: [activities]
      summary: Create activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /activities/{id}:
    get:
      operationId: getActivity
      tags: [activities]
      summary: Get activity by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
    put:
      operationId: updateActivity
      tags: [activities]
      summary: Update activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
    delete:
      operationId: deleteActivity
      tags: [activities]
      summary: Delete activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /teachers:
    get:
      operationId: listTeachers
      tags: [teachers]
      summary: List all teachers
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: string
        - name: sortField
          in: query
          schema:
            type: string
        - name: sortDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Teachers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherListResponse"
    post:
      operationId: createTeacher
      tags: [teachers]
      summary: Create teacher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeacherRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"

  /teachers/{id}:
    put:
      operationId: updateTeacher
      tags: [teachers]
      summary: Update teacher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeacherRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Teacher"
    delete:
      operationId: deleteTeacher
      tags: [teachers]
      summary: Delete teacher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /backups:
    get:
      operationId: listBackups
      tags: [backups]
      summary: List all backups
      responses:
        "200":
          description: OK
    post:
      operationId: createBackup
      tags: [backups]
      summary: Create backup
      responses:
        "200":
          description: OK

  /backups/{filename}/send-telegram:
    post:
      operationId: sendBackupTelegram
      tags: [backups]
      summary: Send backup to Telegram
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /classrooms:
    get:
      operationId: listClassrooms
      tags: [classrooms]
      summary: List all classrooms
      responses:
        "200":
          description: Classrooms list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassroomListResponse"
    post:
      operationId: createClassroom
      tags: [classrooms]
      summary: Create classroom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassroomRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"

  /classrooms/{id}:
    put:
      operationId: updateClassroom
      tags: [classrooms]
      summary: Update classroom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassroomRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classroom"
    delete:
      operationId: deleteClassroom
      tags: [classrooms]
      summary: Delete classroom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: grade
          in: query
          schema:
            type: string
        - name: classId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: sortField
          in: query
          schema:
            type: string
        - name: sortDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Students list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentListResponse"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    put:
      operationId: updateStudent
      tags: [students]
      summary: Update student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List contact messages
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Contact messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactListResponse"

  /contacts/{id}/read:
    patch:
      operationId: markContactRead
      tags: [contacts]
      summary: Mark contact message as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"

  /contacts/{id}:
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete contact message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /discipline-logs:
    post:
      operationId: createDisciplineLog
      tags: [students]
      summary: Create discipline log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDisciplineLogRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisciplineLog"

  /discipline-logs/{id}:
    put:
      operationId: updateDisciplineLog
      tags: [students]
      summary: Update discipline log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDisciplineLogRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisciplineLog"
    delete:
      operationId: deleteDisciplineLog
      tags: [students]
      summary: Delete discipline log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /library/logs:
    get:
      operationId: listLibraryLogs
      tags: [library]
      summary: List library borrow/return logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Library logs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryLogListResponse"
    post:
      operationId: createLibraryLog
      tags: [library]
      summary: Create a library borrow log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLibraryLogRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryLog"

  /library/logs/{id}:
    put:
      operationId: updateLibraryLog
      tags: [library]
      summary: Update library log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLibraryLogRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryLog"
    delete:
      operationId: deleteLibraryLog
      tags: [library]
      summary: Delete library log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /grades:
    get:
      operationId: listGrades
      tags: [grades]
      summary: List student grades by classroom, year, and period
      parameters:
        - name: classroomId
          in: query
          required: false
          schema:
            type: integer
        - name: academicYear
          in: query
          required: false
          schema:
            type: string
        - name: examPeriod
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Grades list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentGradeListResponse"
    post:
      operationId: bulkUpdateGrades
      tags: [grades]
      summary: Bulk create or update grades
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateGradesRequest"
      responses:
        "200":
          description: Successfully updated grades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"


  /api/id-card-templates:
    get:
      summary: List all ID card templates
      tags: [IDCardTemplates]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of ID card templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListIdCardTemplatesResponse'
    post:
      summary: Create ID card template
      tags: [IDCardTemplates]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIdCardTemplateBody'
      responses:
        '201':
          description: The created template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdCardTemplate'

  /api/id-card-templates/{id}:
    put:
      summary: Update ID card template
      tags: [IDCardTemplates]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIdCardTemplateBody'
      responses:
        '200':
          description: The updated template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdCardTemplate'
    delete:
      summary: Delete ID card template
      tags: [IDCardTemplates]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Template deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteIdCardTemplateResponse'

  /telegram/messages:
    get:
      summary: Get all messages (paginated)
      tags: [TelegramInbox]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: A list of telegram messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramMessageListResponse'

  /telegram/messages/unread:
    get:
      summary: Get unread count and list
      tags: [TelegramInbox]
      responses:
        '200':
          description: Unread messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TelegramMessage'
                required: [count, data]

  /telegram/messages/{id}:
    get:
      summary: Get single message
      tags: [TelegramInbox]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: A single message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramMessage'
    put:
      summary: Update message status
      tags: [TelegramInbox]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTelegramMessageStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramMessage'
    delete:
      summary: Delete message (admin only)
      tags: [TelegramInbox]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /telegram/reply:
    post:
      summary: Send reply to user
      tags: [TelegramInbox]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramReplyRequest'
      responses:
        '200':
          description: Reply sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramMessage'

  /backups:
    get:
      operationId: getBackups
      tags: [settings]
      summary: Get backup history
      responses:
        '200':
          description: A list of backup files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BackupFile'
    post:
      operationId: createBackup
      tags: [settings]
      summary: Trigger a manual system backup
      responses:
        '200':
          description: Backup completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupFile'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /backups/{filename}:
    get:
      operationId: downloadBackup
      tags: [settings]
      summary: Download a backup file
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The backup file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    BackupFile:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
        size:
          type: string
        date:
          type: string
        status:
          type: string
          enum: [success, failed]
      required: [id, filename, size, date, status]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AdminUser"
      required: [token, user]

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        createdAt:
          type: string
      required: [id, username, createdAt]

    DashboardStats:
      type: object
      properties:
        totalStudents:
          type: integer
        totalTeachers:
          type: integer
        totalClasses:
          type: integer
        totalSubjects:
          type: integer
        newStudents:
          type: integer
        droppedStudents:
          type: integer
        newsCount:
          type: integer
        activitiesCount:
          type: integer
        teachersCount:
          type: integer
        studentsCount:
          type: integer
        unreadContactsCount:
          type: integer
      required: [totalStudents, totalTeachers, totalClasses, totalSubjects, newStudents, droppedStudents, newsCount, activitiesCount, teachersCount, studentsCount, unreadContactsCount]

    NewsArticle:
      type: object
      properties:
        id:
          type: integer
        titleEn:
          type: string
        titleKh:
          type: string
        contentEn:
          type: string
        contentKh:
          type: string
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
        isPublished:
          type: boolean
        publishedAt:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, titleEn, titleKh, contentEn, contentKh, category, isPublished, publishedAt, createdAt, updatedAt]

    CreateNewsRequest:
      type: object
      properties:
        titleEn:
          type: string
        titleKh:
          type: string
        contentEn:
          type: string
        contentKh:
          type: string
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
        isPublished:
          type: boolean
        sendToMain:
          type: boolean
        sendToTeachers:
          type: boolean
        sendToStudents:
          type: boolean
        sendToParents:
          type: boolean
        pinToMain:
          type: boolean
      required: [titleEn, titleKh, contentEn, contentKh, category]

    NewsListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"
        total:
          type: integer
      required: [data, total]

    Activity:
      type: object
      properties:
        id:
          type: integer
        titleEn:
          type: string
        titleKh:
          type: string
        descriptionEn:
          type: string
        descriptionKh:
          type: string
        category:
          type: string
        imageUrl:
          type: string
          nullable: true
        eventDate:
          type: string
        likes:
          type: integer
        commentsCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, titleEn, titleKh, descriptionEn, descriptionKh, category, eventDate, likes, commentsCount, createdAt, updatedAt]

    CreateActivityRequest:
      type: object
      properties:
        titleEn:
          type: string
        titleKh:
          type: string
        descriptionEn:
          type: string
        descriptionKh:
          type: string
        category:
          type: string
        imageUrl:
          type: string
          nullable: true
        eventDate:
          type: string
        likes:
          type: integer
        commentsCount:
          type: integer
      required: [titleEn, titleKh, descriptionEn, descriptionKh, category, eventDate]

    ActivityListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Activity"
        total:
          type: integer
      required: [data, total]

