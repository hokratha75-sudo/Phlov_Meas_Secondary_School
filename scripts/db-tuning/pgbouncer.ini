[databases]
# Map connection string database to local PostgreSQL database
phlov_meas = host=127.0.0.1 port=5432 dbname=phlov_meas

[pgbouncer]
# -----------------------------
# General Settings
# -----------------------------
listen_addr = 127.0.0.1
listen_port = 6432
unix_socket_dir = /var/run/postgresql

# -----------------------------
# Authentication
# -----------------------------
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# -----------------------------
# Admin Users
# -----------------------------
admin_users = postgres
stats_users = postgres

# -----------------------------
# Connection Pooling
# -----------------------------
pool_mode = transaction
server_reset_query = DISCARD ALL
max_client_conn = 1000               # Total concurrent connections clients can open to pgBouncer
default_pool_size = 20               # Maximum number of server connections per database
reserve_pool_size = 5                # Extra connections allowed when pool is exhausted
reserve_pool_timeout = 3             # Seconds to wait before using reserve pool

# -----------------------------
# Timeouts & Limits
# -----------------------------
server_lifetime = 3600
server_idle_timeout = 600
client_idle_timeout = 0
query_timeout = 0
query_wait_timeout = 120

# -----------------------------
# Logging
# -----------------------------
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
