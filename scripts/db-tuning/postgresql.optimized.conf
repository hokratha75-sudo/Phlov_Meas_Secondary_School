# ------------------------------------------------------------------------------
# Phlov Meas Secondary School - PostgreSQL 15 Configuration
# Optimized for: 4GB RAM, 2 vCPUs, SSD Storage
# ------------------------------------------------------------------------------

# -----------------------------
# Connection Settings
# -----------------------------
listen_addresses = '*'
max_connections = 100
superuser_reserved_connections = 3

# -----------------------------
# Memory Settings
# -----------------------------
shared_buffers = 1GB                  # 25% of 4GB RAM
effective_cache_size = 3GB            # 75% of 4GB RAM
work_mem = 32MB                       # For complex sorts/hashes (32MB * max_connections is safe due to pooling)
maintenance_work_mem = 256MB          # For VACUUM, CREATE INDEX, etc.

# -----------------------------
# Checkpoint & WAL Settings
# -----------------------------
wal_level = replica                   # Required for WAL archiving / PITR
wal_buffers = 16MB                    # Usually 1/32 of shared_buffers, up to 16MB
checkpoint_completion_target = 0.9    # Spread out checkpoint I/O
checkpoint_timeout = 15min
max_wal_size = 4GB
min_wal_size = 1GB

# --- Archiving (From Phase 1) ---
archive_mode = on
archive_command = 'test ! -f /var/backups/phlov_meas/db/wal_archive/%f && cp %p /var/backups/phlov_meas/db/wal_archive/%f'

# -----------------------------
# SSD Query Tuning
# -----------------------------
random_page_cost = 1.1                # SSD optimization (default 4.0 is for HDD)
effective_io_concurrency = 200        # SSD optimization

# -----------------------------
# Logging & Monitoring
# -----------------------------
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 10MB
log_min_duration_statement = 1000     # Log queries taking > 1 second (1000ms)
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# -----------------------------
# Extensions (pg_stat_statements)
# -----------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
